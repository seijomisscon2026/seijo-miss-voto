<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --red: #982226;
      --red-dark: #681214;
      --red-soft: #b84a4b;
      --ivory: #fffaf4;
      --cream: #fff4ec;
      --gold: #d5b36a;
      --text: #2d2220;
      --muted: #756767;
      --border: rgba(152, 34, 38, .22);
      --shadow: 0 18px 52px rgba(104, 18, 20, .13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Shippori Mincho", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 4%, rgba(255,255,255,.95) 0, transparent 34%),
        radial-gradient(circle at 82% 0%, rgba(184,74,75,.08) 0, transparent 30%),
        linear-gradient(135deg, #fffdf9 0%, #fff5ef 52%, #fffaf5 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(14px + env(safe-area-inset-top)) 15px calc(28px + env(safe-area-inset-bottom));
      position: relative;
      overflow: hidden;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      background: rgba(152, 34, 38, .06);
      filter: blur(22px);
      z-index: -1;
    }
    .page::before { top: -88px; left: -86px; }
    .page::after { bottom: -110px; right: -86px; }

    .brand {
      text-align: center;
      margin: 0 0 12px;
    }

    .brand-logo {
      display: inline-block;
      width: 136px;
      height: 136px;
      border-radius: 30px;
      object-fit: cover;
      box-shadow: 0 14px 38px rgba(104,18,20,.18);
    }

    .hero-photo {
      margin: 0 0 12px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(152,34,38,.16);
      box-shadow: var(--shadow);
      background: #fff;
      position: relative;
    }

    .hero-photo img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      object-position: center 34%;
      display: block;
      filter: brightness(1.03);
    }

    .hero-photo::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 54%;
      background: linear-gradient(to top, rgba(255,250,244,.98), rgba(255,250,244,.18), transparent);
      pointer-events: none;
    }

    .hero-title {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      z-index: 1;
      color: var(--red-dark);
      text-shadow: 0 1px 0 rgba(255,255,255,.8);
    }

    .hero-title .en {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      letter-spacing: .16em;
      font-size: 11px;
      color: var(--red);
    }

    .hero-title .jp {
      margin-top: 2px;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: .05em;
      font-weight: 700;
    }

    .hero {
      background: rgba(255, 255, 255, .76);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px 14px 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      right: -72px;
      top: -88px;
      background: rgba(152,34,38,.07);
      border-radius: 999px;
      filter: blur(8px);
    }

    h1 {
      margin: 0;
      text-align: center;
      color: var(--red);
      font-size: 27px;
      letter-spacing: .05em;
      line-height: 1.42;
      font-weight: 700;
      position: relative;
    }

    .lead {
      margin: 8px auto 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
      position: relative;
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(152, 34, 38, .16);
      background: rgba(255, 250, 244, .9);
      color: var(--red-dark);
      font-size: 13px;
      line-height: 1.65;
      text-align: center;
      white-space: pre-line;
      position: relative;
    }

    .candidate-list {
      display: grid;
      gap: 11px;
      margin: 15px 0 0;
      position: relative;
    }

    .candidate-card {
      display: flex;
      align-items: center;
      gap: 13px;
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.84);
      border-radius: 18px;
      padding: 10px;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
      font: inherit;
      min-height: 94px;
    }

    .candidate-card:active { transform: scale(.985); }

    .candidate-card.selected {
      border-color: rgba(152, 34, 38, .66);
      background: #fff9f6;
      box-shadow: 0 10px 26px rgba(152, 34, 38, .13);
    }

    .avatar {
      width: 74px;
      height: 92px;
      border-radius: 14px;
      flex: 0 0 auto;
      border: 1px solid rgba(152, 34, 38, .24);
      background: linear-gradient(135deg, #fff, #fff3ed);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--red);
      font-weight: 700;
      letter-spacing: .06em;
      box-shadow: 0 6px 18px rgba(104,18,20,.09);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .candidate-info {
      min-width: 0;
      flex: 1;
    }

    .number {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: .16em;
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .name {
      font-size: 20px;
      color: var(--red-dark);
      font-weight: 700;
      letter-spacing: .04em;
      line-height: 1.3;
    }

    .radio-dot {
      margin-left: auto;
      width: 23px;
      height: 23px;
      border-radius: 999px;
      border: 1.5px solid rgba(152, 34, 38, .36);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: #fff;
    }

    .candidate-card.selected .radio-dot::after {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--red);
    }

    .submit {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      padding: 16px 18px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(152, 34, 38, .25);
      font-family: inherit;
    }

    .submit:disabled {
      opacity: .48;
      cursor: not-allowed;
      box-shadow: none;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
      text-align: center;
    }

    .loading {
      text-align: center;
      margin-top: 26px;
      color: var(--muted);
      font-size: 14px;
    }

    .hidden { display: none !important; }

    @media (max-width: 390px) {
      .page { padding-left: 12px; padding-right: 12px; }
      .brand-logo { width: 116px; height: 116px; border-radius: 26px; }
      .hero-photo img { height: 166px; }
      h1 { font-size: 24px; }
      .name { font-size: 18px; }
      .avatar { width: 66px; height: 84px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="brand">
      <img class="brand-logo" id="brandLogo" alt="Story SEIJO MISS CONTEST 2026">
    </section>

    <section class="hero-photo">
      <img id="groupPhoto" alt="SEIJO MISS CONTEST 2026 finalists">
      <div class="hero-title">
        <div class="en">SEIJO MISS CONTEST 2026</div>
        <div class="jp">毎日投票</div>
      </div>
    </section>

    <section class="hero">
      <h1>毎日投票はこちら</h1>
      <p class="lead">1日1回、あなたの1票で応援できます</p>
      <div id="status" class="status">読み込み中...</div>

      <div id="loading" class="loading">LINE認証を確認しています</div>
      <div id="candidateList" class="candidate-list hidden"></div>
      <button id="submitButton" class="submit hidden" disabled>投票する</button>

    </section>
  </main>

    // ==============================
    // 設定：ここだけ後で必要に応じて変更
    // ==============================
    const LIFF_ID = '2010561104-dKFoBUJn';

    // Apps Scriptの「ウェブアプリURL」をここに入れる。
    // 例：'https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxx/exec'
    const API_URL = 'https://script.google.com/macros/s/AKfycbyjFqEqd70yBJ62gL95fL9FLsAsxa0oNJlYN2MgCVzU9JzXZxexKnKLg-eWRhk0gk8nCg/exec';

    const LOCAL_CANDIDATES = [
      { id: '01', name: '池端美悠' },
      { id: '02', name: '河端すみれ' },
      { id: '03', name: '坂本七海' },
      { id: '04', name: '小谷美羽' },
      { id: '05', name: '柳川円佳' },
    ];

    let idToken = '';
    let selectedCandidateId = '';
    let candidates = LOCAL_CANDIDATES;
    let votingEnabled = false;

    const $ = (id) => document.getElementById(id);

    $('brandLogo').src = ASSETS.logo;
    $('groupPhoto').src = ASSETS.group;

    function setStatus(message) {
      $('status').textContent = message;
    }

    function setLoading(isLoading) {
      $('loading').classList.toggle('hidden', !isLoading);
    }

    function jsonp(action, params = {}) {
      return new Promise((resolve, reject) => {
        if (!API_URL || API_URL === 'PASTE_APPS_SCRIPT_WEB_APP_URL_HERE') {
          reject(new Error('管理者設定が未完了です。index.html の API_URL にApps ScriptのウェブアプリURLを入れてください。'));
          return;
        }

        const callbackName = 'seijoVoteCb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const query = new URLSearchParams({
          action,
          callback: callbackName,
          _: String(Date.now()),
          ...params,
        });

        const cleanup = () => {
          try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
          script.remove();
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('通信がタイムアウトしました。時間をおいて再度試してください。'));
        }, 60000);

        window[callbackName] = (data) => {
          clearTimeout(timer);
          cleanup();
          if (data && data.ok === false && data.error) {
            reject(new Error(data.error));
            return;
          }
          resolve(data);
        };

        script.onerror = () => {
          clearTimeout(timer);
          cleanup();
          reject(new Error('通信がタイムアウトしました。時間をおいて再度試してください。'));
        };

        script.src = API_URL + '?' + query.toString();
        document.body.appendChild(script);
      });
    }

    function renderCandidates() {
      const list = $('candidateList');
      list.innerHTML = '';

      candidates.forEach((candidate, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'candidate-card';
        button.dataset.id = candidate.id;
        button.disabled = !votingEnabled;

        const avatarWrap = document.createElement('div');
        avatarWrap.className = 'avatar';

        const imageSrc = ASSETS.candidates[candidate.id] || '';
        if (imageSrc) {
          const img = document.createElement('img');
          img.src = imageSrc;
          img.alt = candidate.name;
          avatarWrap.appendChild(img);
        } else {
          avatarWrap.textContent = `No.${index + 1}`;
        }

        const info = document.createElement('div');
        info.className = 'candidate-info';

        const number = document.createElement('div');
        number.className = 'number';
        number.textContent = `FINALIST ${String(index + 1).padStart(2, '0')}`;

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = candidate.name;

        info.appendChild(number);
        info.appendChild(name);

        const dot = document.createElement('div');
        dot.className = 'radio-dot';
        dot.setAttribute('aria-hidden', 'true');

        button.appendChild(avatarWrap);
        button.appendChild(info);
        button.appendChild(dot);

        button.addEventListener('click', () => selectCandidate(candidate.id));
        list.appendChild(button);
      });
    }

    function selectCandidate(candidateId) {
      if (!votingEnabled) return;
      selectedCandidateId = candidateId;
      document.querySelectorAll('.candidate-card').forEach(card => {
        card.classList.toggle('selected', card.dataset.id === candidateId);
      });
      $('submitButton').disabled = !selectedCandidateId;
    }

    async function initialize() {
      try {
        setStatus('STEP 1/5：LIFF IDを確認しています…');

        if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID_HERE') {
          throw new Error('管理者設定が未完了です。LIFF_IDを設定してください。');
        }

        setStatus('STEP 2/5：liff.initを実行しています…');
        await liff.init({ liffId: LIFF_ID });

        setStatus('STEP 3/5：LINEログイン状態を確認しています…');
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        setStatus('STEP 4/5：IDトークンを取得しています…');
        idToken = liff.getIDToken();
        if (!idToken) {
          throw new Error('LINEのIDトークンが取得できませんでした。LIFFのスコープにopenidを追加してください。');
        }

        setStatus('STEP 5/5：投票状況を確認しています…');
        const status = await jsonp('status', { idToken });
        candidates = (status.config && status.config.candidates) || LOCAL_CANDIDATES;
        votingEnabled = status.periodStatus === 'open' && !status.alreadyVoted;

        if (status.periodStatus === 'before') {
          setStatus('投票開始前です。\n2026/7/4 12:00から投票できます。');
        } else if (status.periodStatus === 'ended') {
          setStatus('投票期間は終了しました。');
        } else if (status.alreadyVoted) {
          setStatus(`本日の投票は完了しています。\n今日は「${status.votedCandidateName}」さんに投票済みです。\n明日また投票できます！`);
        } else {
          setStatus('応援したいファイナリストを1人選んでください。');
        }

        renderCandidates();
        $('candidateList').classList.remove('hidden');
        $('submitButton').classList.remove('hidden');
        $('submitButton').disabled = true;
        setLoading(false);
      } catch (error) {
        setLoading(false);
        setStatus(error.message || 'エラーが発生しました。時間を置いて再度お試しください。');
      }
    }

    $('submitButton').addEventListener('click', async () => {
      if (!selectedCandidateId || !votingEnabled) return;
      $('submitButton').disabled = true;
      $('submitButton').textContent = '送信中...';

      try {
        const result = await jsonp('submit', {
          idToken,
          candidateId: selectedCandidateId,
          userAgent: navigator.userAgent,
        });

        votingEnabled = false;
        setStatus(result.message);
        document.querySelectorAll('.candidate-card').forEach(card => card.disabled = true);
        $('submitButton').textContent = '投票済み';
      } catch (error) {
        $('submitButton').disabled = false;
        $('submitButton').textContent = '投票する';
        setStatus(error.message || '投票に失敗しました。もう一度お試しください。');
      }
    });

    initialize();
  </script>
