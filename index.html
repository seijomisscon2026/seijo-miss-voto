<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>SEIJO MISS CONTEST 2026 毎日投票</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --wine: #91272a;
      --wine-dark: #64181d;
      --gold: #d7ab52;
      --pink: #f8e7e6;
      --cream: #fffaf6;
      --line: rgba(145,39,42,.18);
      --text: #432f2d;
      --green: #47ad65;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 8%, rgba(243,207,201,.46), transparent 28%),
        linear-gradient(180deg, #fffaf7 0%, #fcedea 100%);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    }

    button { font: inherit; }

    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 22px 18px 48px;
    }

    .logo {
      width: 132px;
      height: 132px;
      display: block;
      margin: 4px auto 22px;
      object-fit: cover;
      border-radius: 25px;
      box-shadow: 0 12px 28px rgba(95,25,29,.18);
    }

    .panel {
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 14px 35px rgba(92,44,43,.08);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .intro {
      padding: 28px 22px;
      text-align: center;
    }

    .intro h1 {
      margin: 0 0 10px;
      color: var(--wine);
      font-size: clamp(30px, 7vw, 48px);
      letter-spacing: .08em;
    }

    .intro p { margin: 0; font-size: 16px; }

    .status {
      white-space: pre-line;
      margin: 22px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      color: var(--wine-dark);
      background: rgba(255,252,248,.9);
      line-height: 1.8;
    }

    .candidate-list {
      display: grid;
      gap: 14px;
      padding: 0 18px 22px;
    }

    .candidate-card {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 22px;
      padding: 12px;
      display: grid;
      grid-template-columns: 92px 1fr 32px;
      align-items: center;
      gap: 14px;
      text-align: left;
      color: var(--text);
      transition: .2s ease;
    }

    .candidate-card:disabled { opacity: .62; }
    .candidate-card.selected {
      border-color: var(--wine);
      box-shadow: 0 0 0 3px rgba(145,39,42,.10);
      transform: translateY(-1px);
    }

    .candidate-card img {
      width: 92px;
      height: 112px;
      object-fit: cover;
      border-radius: 16px;
    }

    .candidate-number {
      color: var(--gold);
      letter-spacing: .15em;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .candidate-name {
      color: var(--wine-dark);
      font-size: 24px;
      font-weight: 700;
    }

    .radio {
      width: 27px;
      height: 27px;
      border: 2px solid rgba(145,39,42,.35);
      border-radius: 50%;
      position: relative;
    }

    .selected .radio::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: var(--wine);
    }

    .submit {
      width: calc(100% - 36px);
      margin: 0 18px 24px;
      padding: 17px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #a4383c, #711b20);
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 12px 26px rgba(118,28,32,.23);
    }

    .submit:disabled { opacity: .45; }

    .note {
      color: #7f6e6b;
      text-align: center;
      font-size: 13px;
      line-height: 1.8;
      padding: 0 16px 8px;
    }

    .hidden { display: none !important; }

    /* 投票完了画面：1画面スクショを最優先 */
    body.completion-mode .logo {
      display: none;
    }

    body.completion-mode .page {
      padding-top: 8px;
    }

    .completion {
      animation: reveal .35s ease both;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .completion-main {
      overflow: hidden;
      margin-bottom: 12px;
      background: rgba(255,255,255,.92);
    }

    .completion-photo-wrap {
      background: #fff;
      border-bottom: 1px solid rgba(145,39,42,.10);
    }

    .completion-photo {
      display: block;
      width: 100%;
      height: min(55svh, 500px);
      object-fit: contain;
      object-position: center;
      background: #fff;
    }

    .completion-summary {
      padding: 9px 16px 14px;
      text-align: center;
    }

    .identity-line {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
      color: var(--gold);
      letter-spacing: .09em;
      line-height: 1.2;
    }

    .identity-line .contest {
      color: var(--wine);
      font-size: 10px;
    }

    .identity-line .separator {
      color: rgba(145,39,42,.32);
    }

    .identity-line .finalist {
      font-size: 11px;
    }

    .completion-name {
      color: var(--wine-dark);
      font-size: clamp(25px, 7vw, 34px);
      line-height: 1.05;
      margin: 5px 0 9px;
    }

    .completion-complete {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 9px 19px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #55bd73, #399b57);
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 7px 16px rgba(46,146,77,.15);
    }

    .streak {
      color: var(--wine);
      font-size: clamp(20px, 5.5vw, 27px);
      line-height: 1.15;
      margin: 10px 0 4px;
    }

    .tomorrow {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
    }

    .vote-time {
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px dashed rgba(213,168,78,.58);
      color: #746461;
      font-size: 10px;
      line-height: 1.25;
    }

    /* シェア部分はスクロール後に表示 */
    .share-card {
      padding: 25px 18px;
      text-align: center;
      margin-top: 0;
    }

    .share-card h3 {
      color: var(--wine);
      margin: 0 0 18px;
      font-size: 22px;
    }

    .share-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .share-button {
      border: 0;
      border-radius: 16px;
      padding: 14px 8px;
      color: #fff;
      font-weight: 700;
      min-height: 56px;
    }

    .share-x { background: #151515; }
    .share-instagram { background: linear-gradient(135deg,#f8a13c,#dc397a,#7148c8); }
    .share-line { background: #12b84d; }

    .share-label {
      margin: 22px 0 10px;
      color: #806c68;
      font-size: 13px;
    }

    .share-text {
      white-space: pre-line;
      padding: 18px;
      border: 1px solid rgba(213,168,78,.7);
      border-radius: 18px;
      background: #fffdfa;
      line-height: 1.8;
    }

    .copy-button {
      margin-top: 12px;
      border: 1px solid var(--line);
      color: var(--wine);
      background: #fff;
      border-radius: 999px;
      padding: 10px 18px;
    }

    @media (max-width: 480px) {
      .page { padding-left: 12px; padding-right: 12px; }
      .candidate-card {
        grid-template-columns: 76px 1fr 27px;
        gap: 10px;
      }
      .candidate-card img {
        width: 76px;
        height: 94px;
      }
      .candidate-name { font-size: 20px; }
      .share-button { font-size: 12px; }
      body.completion-mode .page {
        padding-left: 7px;
        padding-right: 7px;
      }
      .completion-photo {
        height: min(54svh, 470px);
      }
      .completion-main {
        border-radius: 22px;
      }
      .completion-summary {
        padding: 8px 12px 12px;
      }
      .identity-line {
        gap: 7px;
      }
      .completion-complete {
        font-size: 15px;
        padding: 8px 17px;
      }
      .share-button {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <img class="logo" src="./assets/logo.jpeg" alt="Story SEIJO MISS CONTEST 2026">

    <section id="votePanel" class="panel">
      <div class="intro">
        <h1>毎日投票はこちら</h1>
        <p>1日1回、あなたの1票で応援できます</p>
        <div id="status" class="status">読み込み中...</div>
      </div>

      <div id="candidateList" class="candidate-list hidden"></div>
      <button id="submitButton" class="submit hidden" disabled>このファイナリストに投票する</button>
      <p class="note">投票期間：2026/7/4 12:00 ～ 2026/11/20 23:59<br>毎日0:00に投票回数がリセットされます。</p>
    </section>

    <section id="completionView" class="completion hidden">
      <article class="panel completion-main">
        <div class="completion-photo-wrap">
          <img id="completionPhoto" class="completion-photo" alt="">
        </div>

        <div class="completion-summary">
          <div class="identity-line">
            <span class="contest">SEIJO MISS CONTEST 2026</span>
            <span class="separator">│</span>
            <span id="completionFinalist" class="finalist"></span>
          </div>

          <h2 id="completionName" class="completion-name"></h2>

          <div class="completion-complete">✓ 投票が完了しました</div>
          <h3 id="streakText" class="streak"></h3>
          <p class="tomorrow">明日もこのページから投票できます</p>
          <div id="voteTime" class="vote-time"></div>
        </div>
      </article>

      <article class="panel share-card">
        <h3>応援の気持ちをシェアしよう</h3>
        <div class="share-grid">
          <button id="shareX" class="share-button share-x">Xでシェア</button>
          <button id="shareInstagram" class="share-button share-instagram">インスタでシェア</button>
          <button id="shareLine" class="share-button share-line">LINEでシェア</button>
        </div>
        <div class="share-label">シェア文（コピーして使えます）</div>
        <div id="shareText" class="share-text"></div>
        <button id="copyButton" class="copy-button">シェア文をコピー</button>
      </article>
    </section>
  </main>

  <script>
    const LIFF_ID = '2010561104-dKFoBUJn';

    // 必ず現在使っているApps ScriptのウェブアプリURLに変更
    const API_URL = 'https://script.google.com/macros/s/AKfycbyjFqEqd70yBJ62gL95fL9FLsAsxa0oNJlYN2MgCVzU9JzXZxexKnKLg-eWRhk0gk8nCg/exec';

    const CANDIDATES = [
      { id: '01', name: '池端美悠', photoCount: 3 },
      { id: '02', name: '河端すみれ', photoCount: 3 },
      { id: '03', name: '坂本七海', photoCount: 3 },
      { id: '04', name: '小谷美羽', photoCount: 3 },
      { id: '05', name: '柳川円佳', photoCount: 2 },
    ];

    let idToken = '';
    let selectedCandidateId = '';
    let votingEnabled = false;
    let completionData = null;

    const $ = id => document.getElementById(id);
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function setStatus(message) {
      $('status').textContent = message;
    }

    function jsonpOnce(action, params = {}, timeoutMs = 45000) {
      return new Promise((resolve, reject) => {
        if (!API_URL || API_URL.includes('PASTE_CURRENT')) {
          reject(new Error('index.htmlのAPI_URLを設定してください。'));
          return;
        }

        const callbackName = `seijoCb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement('script');
        const query = new URLSearchParams({
          action,
          callback: callbackName,
          _: String(Date.now()),
          ...params,
        });

        const cleanup = () => {
          clearTimeout(timer);
          try { delete window[callbackName]; } catch (_) {}
          script.remove();
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Apps Scriptとの通信がタイムアウトしました。'));
        }, timeoutMs);

        window[callbackName] = data => {
          cleanup();
          if (data && data.ok === false) {
            reject(new Error(data.error || '通信エラー'));
            return;
          }
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Apps Scriptとの通信に失敗しました。'));
        };

        script.src = `${API_URL}?${query.toString()}`;
        document.body.appendChild(script);
      });
    }

    async function jsonp(action, params = {}, label = '通信') {
      let lastError;

      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          if (attempt > 1) {
            setStatus(`${label}に時間がかかっています。再試行しています…（${attempt}/3）`);
          }
          return await jsonpOnce(action, params);
        } catch (error) {
          lastError = error;
          if (attempt < 3) await sleep(1200 * attempt);
        }
      }

      throw lastError || new Error(`${label}に失敗しました。`);
    }

    function renderCandidates(candidates = CANDIDATES) {
      const list = $('candidateList');
      list.innerHTML = '';

      candidates.forEach((candidate, index) => {
        const button = document.createElement('button');
        button.className = 'candidate-card';
        button.type = 'button';
        button.disabled = !votingEnabled;
        button.dataset.id = candidate.id;

        button.innerHTML = `
          <img src="./assets/candidates/${candidate.id}.jpeg" alt="${candidate.name}">
          <div>
            <div class="candidate-number">FINALIST ${String(index + 1).padStart(2, '0')}</div>
            <div class="candidate-name">${candidate.name}</div>
          </div>
          <div class="radio"></div>
        `;

        button.addEventListener('click', () => {
          if (!votingEnabled) return;

          selectedCandidateId = candidate.id;
          document.querySelectorAll('.candidate-card').forEach(card => {
            card.classList.toggle('selected', card.dataset.id === candidate.id);
          });
          $('submitButton').disabled = false;
        });

        list.appendChild(button);
      });
    }

    function buildShareText(candidateName) {
      return `成城ミスコン2026で${candidateName}さんを応援中！\n毎日投票で応援しています✨\n#成城ミスコン2026`;
    }

    function showCompletion(data) {
      completionData = data;
      document.body.classList.add('completion-mode');
      const candidateIndex = CANDIDATES.findIndex(item => item.id === data.candidateId);
      const shareText = buildShareText(data.candidateName);

      $('votePanel').classList.add('hidden');
      $('completionView').classList.remove('hidden');

      $('completionPhoto').src = `./assets/completion/${data.photoKey}.jpeg`;
      $('completionPhoto').alt = `${data.candidateName} 投票完了メッセージ`;
      $('completionFinalist').textContent = `FINALIST ${String(candidateIndex + 1).padStart(2, '0')}`;
      $('completionName').textContent = data.candidateName;
      $('streakText').textContent = `${data.streakCount}日連続投票ありがとう！`;
      $('voteTime').textContent = `最終投票日時：${String(data.voteTimestamp || '').replaceAll('-', '/')}`;
      $('shareText').textContent = shareText;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function copyShareText() {
      const text = buildShareText(completionData.candidateName);
      await navigator.clipboard.writeText(text);
      $('copyButton').textContent = 'コピーしました！';
      setTimeout(() => $('copyButton').textContent = 'シェア文をコピー', 1800);
    }

    $('copyButton').addEventListener('click', copyShareText);

    $('shareX').addEventListener('click', () => {
      const text = buildShareText(completionData.candidateName);
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`;
      location.href = url;
    });

    $('shareLine').addEventListener('click', () => {
      const text = `${buildShareText(completionData.candidateName)}\n${location.href}`;
      location.href = `https://line.me/R/share?text=${encodeURIComponent(text)}`;
    });

    $('shareInstagram').addEventListener('click', async () => {
      const text = buildShareText(completionData.candidateName);

      try {
        await navigator.clipboard.writeText(text);

        if (navigator.share) {
          await navigator.share({
            title: '成城ミスコン2026',
            text,
            url: location.href,
          });
        } else {
          alert('シェア文をコピーしました。Instagramを開いて貼り付けてください。');
          location.href = 'https://www.instagram.com/';
        }
      } catch (error) {
        if (error && error.name === 'AbortError') return;
        alert('シェア文をコピーしました。Instagramで貼り付けてください。');
      }
    });

    $('submitButton').addEventListener('click', async () => {
      if (!selectedCandidateId || !votingEnabled) return;

      $('submitButton').disabled = true;
      $('submitButton').textContent = '投票を送信しています…';

      try {
        const response = await jsonp('submit', {
          idToken,
          candidateId: selectedCandidateId,
          userAgent: navigator.userAgent,
        }, '投票送信');

        showCompletion(response.completion);
      } catch (error) {
        $('submitButton').disabled = false;
        $('submitButton').textContent = 'このファイナリストに投票する';
        setStatus(error.message || '投票に失敗しました。');
      }
    });

    async function initialize() {
      try {
        setStatus('LINE認証を確認しています…');

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: location.href });
          return;
        }

        idToken = liff.getIDToken();
        if (!idToken) throw new Error('LINE認証情報を取得できませんでした。');

        setStatus('本日の投票状況を確認しています…');
        const response = await jsonp('status', { idToken }, '投票状況確認');

        if (response.alreadyVoted && response.completion) {
          showCompletion(response.completion);
          return;
        }

        const candidates = response.config?.candidates || CANDIDATES;
        renderCandidates(candidates);

        $('candidateList').classList.remove('hidden');
        $('submitButton').classList.remove('hidden');

        if (response.periodStatus === 'before') {
          setStatus('投票開始前です。\n2026/7/4 12:00から投票できます。');
          votingEnabled = false;
        } else if (response.periodStatus === 'ended') {
          setStatus('投票期間は終了しました。');
          votingEnabled = false;
        } else {
          votingEnabled = true;
          setStatus('応援したいファイナリストを1人選んでください。');
          renderCandidates(candidates);
        }
      } catch (error) {
        setStatus(error.message || 'ページの読み込みに失敗しました。');
      }
    }

    initialize();
  </script>
</body>
</html>
